<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HECVAT 4.14 Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f3ef;--surface:#fff;--surface2:#f0ede8;--border:#ddd9d2;
  --text:#1c1a17;--muted:#6b6560;--accent:#2d4a3e;--accent-light:#e8f0ec;
  --green:#2d7a4a;--red:#8b1a1a;--amber:#8b6a1a;--radius:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);font-size:13.5px;line-height:1.6;}

/* Header */
.page-header{background:var(--accent);color:#fff;padding:28px 48px 20px;position:sticky;top:0;z-index:200;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;}
.header-left .header-meta{font-size:10px;letter-spacing:.12em;text-transform:uppercase;opacity:.55;margin-bottom:4px;}
.header-left .header-title{font-family:'Fraunces',serif;font-size:24px;font-weight:300;letter-spacing:-.01em;}
.score-summary{display:flex;gap:16px;align-items:center;}
.score-pill{background:rgba(255,255,255,.15);border-radius:8px;padding:8px 16px;text-align:center;min-width:80px;}
.score-pill .score-value{font-family:'Fraunces',serif;font-size:22px;font-weight:300;display:block;}
.score-pill .score-label{font-size:9px;letter-spacing:.08em;text-transform:uppercase;opacity:.6;}
.score-pill.overall{background:rgba(255,255,255,.22);}
.progress-wrap{margin-top:14px;background:rgba(255,255,255,.15);border-radius:99px;height:4px;overflow:hidden;}
.progress-fill{height:100%;background:#a8c5b0;border-radius:99px;transition:width .3s;}
.score-bar-wrap{margin-top:6px;background:rgba(255,255,255,.1);border-radius:99px;height:6px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:99px;transition:width .4s,background .4s;}
.score-bar-fill.good{background:#5aab77;}
.score-bar-fill.warn{background:#d4a017;}
.score-bar-fill.bad{background:#c0504d;}
.header-stats{display:flex;gap:20px;margin-top:8px;font-size:10.5px;opacity:.5;}

/* Layout */
.layout{display:grid;grid-template-columns:248px 1fr;gap:0;max-width:1200px;margin:0 auto;padding:28px 20px;align-items:start;}
.sidebar{position:sticky;top:160px;padding-right:20px;max-height:calc(100vh - 190px);overflow-y:auto;}
.sidebar-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-left:6px;}
.nav-item{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:var(--radius);cursor:pointer;color:var(--muted);font-size:11px;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:var(--accent-light);color:var(--accent);}
.nav-item.active{background:var(--accent-light);color:var(--accent);}
.nav-code{font-size:9px;min-width:32px;color:var(--muted);flex-shrink:0;}
.nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;}
.nav-score{font-size:9px;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.nav-score.good{background:#e8f5ec;color:var(--green);}
.nav-score.warn{background:#fff8e0;color:var(--amber);}
.nav-score.bad{background:#fdf0f0;color:var(--red);}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* Form */
.form-area{display:flex;flex-direction:column;gap:14px;}
.form-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;user-select:none;transition:background .12s;}
.section-header:hover{background:var(--surface2);}
.section-title-row{display:flex;align-items:center;gap:10px;flex:1;}
.section-code{font-size:9.5px;letter-spacing:.06em;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 5px;border-radius:3px;flex-shrink:0;}
.section-title{font-family:'Fraunces',serif;font-size:15px;font-weight:300;}
.section-count{font-size:10px;color:var(--muted);}
.section-score-badge{font-size:10px;padding:2px 7px;border-radius:4px;margin-left:4px;}
.section-score-badge.good{background:#e8f5ec;color:var(--green);}
.section-score-badge.warn{background:#fff8e0;color:var(--amber);}
.section-score-badge.bad{background:#fdf0f0;color:var(--red);}
.section-score-badge.na{background:var(--surface2);color:var(--muted);}
.section-chevron{font-size:13px;color:var(--muted);transition:transform .2s;margin-left:8px;}
.section-header.collapsed .section-chevron{transform:rotate(-90deg);}
.section-body{border-top:1px solid var(--border);}
.section-body.hidden{display:none;}

.question-card{padding:13px 18px;border-bottom:1px solid var(--border);transition:background .1s;}
.question-card:last-child{border-bottom:none;}
.question-card.compliant{border-left:3px solid #5aab77;}
.question-card.non-compliant{border-left:3px solid #c0504d;}
.question-header{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.question-id{font-size:9.5px;letter-spacing:.06em;color:var(--muted);}
.badge{font-size:9px;padding:1px 5px;border-radius:3px;letter-spacing:.03em;font-weight:500;}
.badge-critical{background:#fdf0f0;color:#8b1a1a;border:1px solid #e8c0c0;}
.badge-standard{background:#f0f6fd;color:#1a4a6b;border:1px solid #c0d8ed;}
.badge-minor{background:#fdf8f0;color:#4a3d1a;border:1px solid #e0d4b8;}
.crit-star{color:#8b1a1a;font-size:11px;}
.compliance-dot{width:8px;height:8px;border-radius:50%;margin-left:auto;flex-shrink:0;}
.compliance-dot.yes{background:#5aab77;}
.compliance-dot.no{background:#c0504d;}
.question-label{display:block;font-size:13px;margin-bottom:8px;line-height:1.5;}
.guidance{font-size:11.5px;color:var(--muted);background:var(--surface2);border-left:2px solid var(--border);padding:7px 9px;margin-bottom:9px;border-radius:0 3px 3px 0;line-height:1.5;}
input[type=text],input[type=email],input[type=tel],textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px 11px;font-family:'DM Mono',monospace;font-size:12.5px;color:var(--text);transition:border-color .12s,box-shadow .12s;resize:vertical;}
input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(45,74,62,.1);background:#fff;}
textarea{min-height:68px;}
.radio-group{display:flex;gap:5px;flex-wrap:wrap;}
.radio-label{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:12px;transition:all .12s;background:var(--bg);}
.radio-label:hover{border-color:var(--accent);background:var(--accent-light);}
.radio-label input[type=radio]{width:auto;margin:0;accent-color:var(--accent);}
.radio-label:has(input:checked){border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.additional-info{margin-top:9px;padding-top:9px;border-top:1px dashed var(--border);}
.additional-info label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px;}

/* Action bar */
.action-bar{display:flex;justify-content:space-between;align-items:center;padding:20px 0;}
.action-group{display:flex;gap:8px;}
.btn{font-family:'DM Mono',monospace;font-size:12.5px;padding:9px 20px;border-radius:var(--radius);cursor:pointer;transition:all .12s;letter-spacing:.02em;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--text);color:var(--text);}
.btn-accent{background:var(--accent);border:1px solid var(--accent);color:#fff;display:flex;align-items:center;gap:8px;}
.btn-accent:hover{background:#1e3329;}
.btn-report-header{font-family:'DM Mono',monospace;font-size:12.5px;padding:9px 18px;border-radius:var(--radius);cursor:pointer;letter-spacing:.02em;background:#fff;border:none;color:var(--accent);font-weight:500;display:flex;align-items:center;gap:6px;transition:all .15s;}
.btn-report-header:hover{background:rgba(255,255,255,.9);transform:translateY(-1px);}

/* Report Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.report-modal{background:var(--surface);border-radius:12px;width:100%;max-width:860px;margin:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);overflow:hidden;}
.report-header{background:var(--accent);color:#fff;padding:28px 36px;}
.report-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;}
.report-header h2{font-family:'Fraunces',serif;font-size:24px;font-weight:300;margin-bottom:4px;}
.report-header .report-sub{font-size:11px;opacity:.5;}
.report-header-btns{display:flex;gap:8px;flex-shrink:0;align-items:center;}
.btn-ghost-inv{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#fff;font-family:'DM Mono',monospace;font-size:12.5px;padding:7px 16px;border-radius:var(--radius);cursor:pointer;transition:all .12s;letter-spacing:.02em;}
.btn-ghost-inv:hover{background:rgba(255,255,255,.2);}
.report-meta{display:flex;gap:24px;margin-top:18px;}
.report-meta-item{text-align:center;}
.report-meta-item .val{font-family:'Fraunces',serif;font-size:28px;font-weight:300;display:block;}
.report-meta-item .lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;opacity:.55;}
.report-body{padding:28px 36px;}
.report-section-title{font-family:'Fraunces',serif;font-size:18px;font-weight:300;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.score-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.score-card-name{font-size:10.5px;color:var(--muted);margin-bottom:6px;}
.score-card-bar{background:var(--border);border-radius:99px;height:6px;overflow:hidden;margin-bottom:6px;}
.score-card-fill{height:100%;border-radius:99px;transition:width .5s;}
.score-card-fill.good{background:#5aab77;}
.score-card-fill.warn{background:#d4a017;}
.score-card-fill.bad{background:#c0504d;}
.score-card-pct{font-size:11px;color:var(--text);font-weight:500;}
.findings-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.finding{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;border-left:3px solid transparent;}
.finding.fail{border-left-color:#c0504d;}
.finding.warn{border-left-color:#d4a017;}
.finding-id{font-size:9.5px;color:var(--muted);margin-bottom:3px;}
.finding-text{font-size:12.5px;line-height:1.4;}
.finding-tag{font-size:9px;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle;}
.finding-tag.critical{background:#fdf0f0;color:#8b1a1a;}
.report-footer{display:flex;justify-content:flex-end;gap:8px;padding:20px 36px;border-top:1px solid var(--border);background:var(--surface2);}
.empty-findings{font-size:12.5px;color:var(--muted);padding:12px;background:var(--bg);border-radius:var(--radius);text-align:center;}
@media(max-width:760px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}.score-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="questions-data.js"></script>
<script src="main.js"></script>
<script>
var app = Elm.Main.init({ node: document.getElementById('app') });

app.ports.scrollTo.subscribe(function(id) {
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

app.ports.generateDocx.subscribe(function(responses) {
  var D = docx;
  var vendorName = responses['GNRL-01'] || 'Untitled Assessment';
  var today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  // Group questions by section
  var sectionMap = {};
  var sectionOrder = [];
  QUESTIONS.forEach(function(q) {
    if (!sectionMap[q.section]) {
      sectionMap[q.section] = { name: q.sectionName, questions: [] };
      sectionOrder.push(q.section);
    }
    sectionMap[q.section].questions.push(q);
  });

  var children = [];

  // Cover heading
  children.push(new D.Paragraph({
    text: 'HECVAT 4.14 — Solution Provider Assessment',
    heading: D.HeadingLevel.TITLE,
    spacing: { after: 120 },
  }));
  children.push(new D.Paragraph({
    children: [new D.TextRun({ text: vendorName, bold: true, size: 28 })],
    spacing: { after: 80 },
  }));
  children.push(new D.Paragraph({
    children: [new D.TextRun({ text: 'Date: ' + today, color: '666666', size: 20 })],
    spacing: { after: 400 },
  }));

  sectionOrder.forEach(function(code) {
    var section = sectionMap[code];
    var hasAnswers = section.questions.some(function(q) { return responses[q.id]; });

    // Section heading
    children.push(new D.Paragraph({
      text: code + '  ' + section.name,
      heading: D.HeadingLevel.HEADING_1,
      spacing: { before: 320, after: 120 },
      border: { bottom: { style: D.BorderStyle.SINGLE, size: 4, color: '2d4a3e' } },
    }));

    section.questions.forEach(function(q) {
      var answer = responses[q.id] || '';
      var addAnswer = responses[q.id + '_add'] || '';

      // Question ID + importance tag
      var tagText = q.importance !== 'Unscored' ? '  [' + q.importance + (q.isCritical ? ' ★' : '') + ']' : '';
      children.push(new D.Paragraph({
        spacing: { before: 160, after: 40 },
        children: [
          new D.TextRun({ text: q.id, bold: true, color: '2d4a3e', size: 20 }),
          new D.TextRun({ text: tagText, color: '888888', size: 18 }),
        ],
      }));

      // Question label
      children.push(new D.Paragraph({
        children: [new D.TextRun({ text: q.label, size: 22 })],
        spacing: { after: 40 },
      }));

      // Guidance
      if (q.guidance) {
        children.push(new D.Paragraph({
          children: [new D.TextRun({ text: q.guidance, italics: true, color: '777777', size: 18 })],
          indent: { left: 360 },
          spacing: { after: 40 },
        }));
      }

      // Answer
      var answerText = answer || '(no response)';
      var answerColor = !answer ? 'aaaaaa' : (answer === 'Yes' ? '2d7a4a' : answer === 'No' ? '8b1a1a' : '333333');
      children.push(new D.Paragraph({
        children: [
          new D.TextRun({ text: 'Response: ', bold: true, size: 20 }),
          new D.TextRun({ text: answerText, color: answerColor, size: 20 }),
        ],
        spacing: { after: addAnswer ? 40 : 80 },
      }));

      // Additional info
      if (addAnswer) {
        children.push(new D.Paragraph({
          children: [
            new D.TextRun({ text: 'Additional: ', bold: true, size: 20 }),
            new D.TextRun({ text: addAnswer, size: 20 }),
          ],
          spacing: { after: 80 },
        }));
      }
    });
  });

  var doc = new D.Document({
    styles: {
      default: {
        document: { run: { font: 'Calibri', size: 22 } },
      },
    },
    sections: [{ children: children }],
  });

  D.Packer.toBlob(doc).then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'HECVAT-4.14-' + vendorName.replace(/[^a-zA-Z0-9]/g, '-') + '.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
});
</script>
</body>
</html>
